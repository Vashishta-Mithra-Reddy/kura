services:
  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    # WebRTC needs the host's real ports, not Traefik HTTP proxying.
    # host networking is the simplest reliable setup for ICE/UDP.
    network_mode: host
    # Entire config passed as an env var. Compose substitutes the ${...} refs
    # below from Dokploy's environment - no mounted file, no volume substitution
    # surprises. This is the single source of truth for the server config.
    environment:
      LIVEKIT_CONFIG_BODY: |
        port: 7880
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - ${LIVEKIT_WEBHOOK_URL}
        logging:
          level: info
          json: false
