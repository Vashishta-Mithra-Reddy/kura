services:
  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
    restart: unless-stopped
    # Host networking on purpose: publishing the UDP media range via `ports:`
    # makes Docker spawn a docker-proxy process per port (10k+), which can pin
    # CPU and hang the whole host. Host net binds the ports directly, zero proxy.
    # This is LiveKit's recommended deployment for exactly this reason.
    network_mode: host
    # Config is read from LIVEKIT_CONFIG (the name the image reads - NOT
    # LIVEKIT_CONFIG_BODY). ${...} refs are interpolated by Dokploy from the env.
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 60000
          use_external_ip: true
        keys:
          "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}": "${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}"
        webhook:
          api_key: "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}"
          urls:
            - "${LIVEKIT_WEBHOOK_URL:?set LIVEKIT_WEBHOOK_URL}"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
