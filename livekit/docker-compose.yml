services:
  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
    restart: unless-stopped
    # Bridge network (NOT host) so Dokploy's Traefik can reach the container and
    # terminate TLS for the wss domain - this mirrors LiveKit's official deploy,
    # where a Caddy reverse proxy fronts port 7880. Traefik plays Caddy's role.
    networks:
      - dokploy-network
    # Config is read from LIVEKIT_CONFIG (the name the image reads - NOT
    # LIVEKIT_CONFIG_BODY). ${...} refs are interpolated by Dokploy from the env.
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          # UDP mux range (LiveKit recommends >= vCPU count). 11 ports - safe to
          # publish. The original outage was from publishing the 50000-60000
          # default (10k ports = docker-proxy storm). Never widen this range.
          udp_port: 7882-7892
          use_external_ip: true
        keys:
          "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}": "${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}"
        webhook:
          api_key: "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}"
          urls:
            - "${LIVEKIT_WEBHOOK_URL:?set LIVEKIT_WEBHOOK_URL}"
    # 7880 is NOT published - Traefik routes the domain to it over dokploy-network
    # (set the domain's Container Port to 7880 in Dokploy, HTTPS on).
    expose:
      - "7880"
    # Media must reach the host directly; the proxy can't carry it. Small range,
    # safe to publish.
    ports:
      - "7881:7881/tcp"
      - "7882-7892:7882-7892/udp"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

networks:
  dokploy-network:
    external: true
