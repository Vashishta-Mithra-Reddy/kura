services:
  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:latest}
    restart: unless-stopped
    # Host networking is LiveKit's recommended production mode AND the thing that
    # makes this crash-proof: it publishes ZERO ports through Docker, so the
    # docker-proxy-per-port storm (which took the box down) cannot happen.
    # Never switch this service to `ports:` - that is what caused the outage.
    network_mode: host
    # Config is read from the LIVEKIT_CONFIG env var (the name the image reads -
    # NOT LIVEKIT_CONFIG_BODY). ${...} refs are interpolated by Dokploy. Matches
    # the proven ekam compose on this same host.
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          # UDP mux: all media goes through this small port range instead of the
          # default 50000-60000. LiveKit recommends a range >= number of vCPUs
          # (config-sample.yaml). 11 ports is plenty for this box. Mutually
          # exclusive with port_range_start/end (do not set those).
          # Safe because host networking publishes ZERO ports via docker-proxy -
          # only a *published* wide range storms the host, never this.
          udp_port: 7882-7892
          # Required on a NAT'd / cloud VM so LiveKit advertises the public IP.
          use_external_ip: true
        keys:
          "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}": "${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}"
        webhook:
          api_key: "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}"
          urls:
            - "${LIVEKIT_WEBHOOK_URL:?set LIVEKIT_WEBHOOK_URL}"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
