# LiveKit server config. Docs: https://docs.livekit.io/home/self-hosting/deployment/
port: 7880

rtc:
  # TCP fallback for clients that can't do UDP.
  tcp_port: 7881
  # UDP range for media. MUST be open on the host firewall / cloud security group.
  # Keep this range modest to avoid huge iptables rules; 100 ports = 100 concurrent
  # participant connections, plenty for most setups.
  port_range_start: 50000
  port_range_end: 50100
  # Required when behind NAT / on a cloud VM so LiveKit advertises the public IP.
  use_external_ip: true

# API keys: key -> secret. These must match LIVEKIT_API_KEY / SECRET used by ekam.
keys:
  ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}

# Push room/participant/egress events to the ekam web app.
webhook:
  api_key: ${LIVEKIT_API_KEY}
  urls:
    - ${LIVEKIT_WEBHOOK_URL}

logging:
  level: info
  json: false
